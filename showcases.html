<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showcases | Studio Erish — Luxury Production Portfolios</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* FULL BLAST LUXURY BREATHING ANIMATION FRAMEWORK */
        @keyframes highBlastLuxuryBreathe {
            0% { transform: scale(1.00); filter: brightness(0.96) contrast(1.02); }
            50% { transform: scale(1.05); filter: brightness(1.04) contrast(0.98); }
            100% { transform: scale(1.00); filter: brightness(0.96) contrast(1.02); }
        }
        .cinematic-breathe {
            animation: highBlastLuxuryBreathe 14s ease-in-out infinite !important;
            transform-origin: center center;
        }
        html, body {
            overflow-x: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
        }
        /* Minimalist Footer Grid Styles */
        .luxury-footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2.5rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            border-top: 1px solid #eaeaea;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: #666;
        }
        .footer-column h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: #111;
            letter-spacing: 2px;
            margin: 0 0 1.2rem 0;
            text-transform: uppercase;
        }
        #site-qr-code canvas, #site-qr-code img {
            margin: 0 auto !important;
            border: 6px solid #fff !important;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06) !important;
            display: block !important;
        }
    </style>
</head>
<body class="editorial-bg">

    <header class="site-header">
        <div class="header-logo">
            <a href="index.html" class="logo-brand">ERISH</a>
            <span class="logo-sub">EST. 2007</span>
        </div>
        <button class="menu-toggle" aria-label="Toggle Navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="main-nav">
            <a href="index.html" class="nav-link">The Journal</a>
            <a href="about.html" class="nav-link">The Legacy</a>
            <a href="services.html" class="nav-link">Curated Services</a>
            <a href="showcases.html" class="nav-link active">Showcases</a>
            <a href="inquire.html" class="nav-link">Inquire</a>
        </nav>
    </header>

    <main style="padding: 6rem 0 0 0 !important; width: 100vw !important; display: block;">
        
        <section style="max-width: 900px; margin: 0 auto 5rem auto; padding: 0 2rem; text-align: center;">
            <span style="letter-spacing: 4px; font-size: 0.8rem; color: #8c8c8c; text-transform: uppercase; display: block; margin-bottom: 1rem;">SELECTED WORKS</span>
            <h1 class="serif-title" style="font-size: 3.2rem; font-weight: 300; letter-spacing: 1px; margin: 0; line-height: 1.2;">A Visual Record of Extraordinary Atmospheres.</h1>
        </section>

        <div style="display: flex; flex-direction: column; gap: 8rem; width: 100vw !important; margin: 0 !important; padding: 0 !important;">

            <div style="width: 100vw !important; position: relative !important; left: 50% !important; right: 50% !important; margin-left: -50vw !important; margin-right: -50vw !important; overflow: hidden !important;">
                <div style="width: 100vw; height: 80vh; overflow: hidden; background-color: #000;">
                    <img src="images/project1.jpg" class="cinematic-breathe" style="width: 100%; height: 100%; object-fit: cover; display: block;" alt="The Grand Ballroom Transformation" />
                </div>
                <div style="max-width: 1200px; margin: 2rem auto 0 auto; padding: 0 3rem;">
                    <span style="display: block; letter-spacing: 3px; text-transform: uppercase; font-size: 0.75rem; color: #8c8c8c; margin-bottom: 0.4rem;">Davao City</span>
                    <h2 class="serif-sub" style="font-size: 2.4rem; font-weight: 300; letter-spacing: 1px; color: #111; margin: 0;">The Grand Ballroom Transformation</h2>
                </div>
            </div>

            <div style="width: 100vw !important; position: relative !important; left: 50% !important; right: 50% !important; margin-left: -50vw !important; margin-right: -50vw !important; overflow: hidden !important;">
                <div style="width: 100vw; height: 80vh; overflow: hidden; background-color: #000;">
                    <img src="images/project2.jpg" class="cinematic-breathe" style="width: 100%; height: 100%; object-fit: cover; display: block;" alt="Oceanfront Coastal Vows" />
                </div>
                <div style="max-width: 1200px; margin: 2rem auto 0 auto; padding: 0 3rem;">
                    <span style="display: block; letter-spacing: 3px; text-transform: uppercase; font-size: 0.75rem; color: #8c8c8c; margin-bottom: 0.4rem;">Samal Island</span>
                    <h2 class="serif-sub" style="font-size: 2.4rem; font-weight: 300; letter-spacing: 1px; color: #111; margin: 0;">Oceanfront Coastal Vows</h2>
                </div>
            </div>

            <div style="width: 100vw !important; position: relative !important; left: 50% !important; right: 50% !important; margin-left: -50vw !important; margin-right: -50vw !important; overflow: hidden !important;">
                <div style="width: 100vw; height: 80vh; overflow: hidden; background-color: #000;">
                    <img src="images/project3.jpg" class="cinematic-breathe" style="width: 100%; height: 100%; object-fit: cover; display: block;" alt="The Avant-Garde Milestone" />
                </div>
                <div style="max-width: 1200px; margin: 2rem auto 0 auto; padding: 0 3rem; margin-bottom: 6rem;">
                    <span style="display: block; letter-spacing: 3px; text-transform: uppercase; font-size: 0.75rem; color: #8c8c8c; margin-bottom: 0.4rem;">Tagum</span>
                    <h2 class="serif-sub" style="font-size: 2.4rem; font-weight: 300; letter-spacing: 1px; color: #111; margin: 0;">The Avant-Garde Milestone</h2>
                </div>
            </div>

        </div>
    </main>

    <footer style="background: #fff; padding: 40px 20px; border-top: 1px solid #eee; text-align: center;">
    <button id="exp-btn" style="padding: 10px 30px; background: #000; color: #fff; border: none; cursor: pointer; margin-bottom: 20px;">
        START EXPERIENCE
    </button>

    <div style="display: flex; justify-content: center; gap: 40px; align-items: center; flex-wrap: wrap;">
        <div>
            <h4 style="font-size: 10px; margin: 0;">TIME</h4>
            <div id="studio-timeclock" style="font-family: monospace; font-size: 14px;">--:--:--</div>
        </div>
        <div>
            <h4 style="font-size: 10px; margin: 0;">VISITS</h4>
            <div id="visit-counter" style="font-family: monospace; font-size: 14px;">0</div>
        </div>
        <div>
            <h4 style="font-size: 10px; margin: 0;">ACCESS</h4>
            <div id="site-qr-code" style="margin-top: 5px;"></div>
        </div>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    // 1. SOUND & BUTTON
    const btn = document.getElementById('exp-btn');
    const clickSound = new Audio('velvet-snap.mp3'); 
    btn.onclick = () => {
        clickSound.play();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // 2. CLOCK
    setInterval(() => {
        document.getElementById("studio-timeclock").innerText = new Date().toLocaleTimeString();
    }, 1000);

    // 3. QR
    const qrEl = document.getElementById("site-qr-code");
    qrEl.innerHTML = ""; 
    new QRCode(qrEl, { text: window.location.href, width: 60, height: 60 });

    // 4. COUNTER
    let count = localStorage.getItem('page_visits') || 1240;
    document.getElementById("visit-counter").innerText = count;
    localStorage.setItem('page_visits', parseInt(count) + 1);
</script>

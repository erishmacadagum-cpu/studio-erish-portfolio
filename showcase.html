<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Showcase — Erish Studio Events & Styling</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root { --cream: #FAF7F2; --warm: #F2EDE4; --gold: #B8965A; --gold-lt: #D4B07A; --dark: #1C1610; --text: #3A3028; --muted: #8A7A6A; --border: #DDD5C8; --white: #FFFFFF; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;}

/* NAVIGATION */
nav{position:fixed;top:0;width:100%;padding:20px 48px;background:rgba(250,247,242,0.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);z-index:100;}

/* SECTIONS */
.showcase-section{padding:100px 24px;}
.grid-hero{max-width:1200px;margin:0 auto;display:grid;gap:15px;}
.img-card{position:relative;overflow:hidden;width:100%;height:100%;background:#e0e0e0;}
.img-card img{width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>

<nav><div><em>Erish</em> Studio</div></nav>

<section class="showcase-section" id="reception">
  <h2>Wedding <em>Reception</em></h2>
  <div class="grid-hero" style="grid-template-columns:1.4fr 1fr 1fr;grid-template-rows:380px 280px;">
    <div class="img-card"><img src="images/reception/reception-1.jpg" alt="Reception 1"></div>
    <div class="img-card"><img src="images/reception/reception-2.jpg" alt="Reception 2"></div>
    <div class="img-card"><img src="images/reception/reception-3.jpg" alt="Reception 3"></div>
    <div class="img-card"><img src="images/reception/reception-4.jpg" alt="Reception 4"></div>
    <div class="img-card"><img src="images/reception/reception-5.jpg" alt="Reception 5"></div>
  </div>
</section>

<section class="showcase-section" id="ceremony">
  <h2>Wedding <em>Ceremony</em></h2>
  <div class="grid-hero" style="grid-template-columns:1fr 1fr;grid-template-rows:420px 260px;">
    <div class="img-card"><img src="images/ceremony/ceremony-1.jpg" alt="Ceremony 1"></div>
    <div class="img-card"><img src="images/ceremony/ceremony-2.jpg" alt="Ceremony 2"></div>
    <div class="img-card" style="grid-column:1/3;"><img src="images/ceremony/ceremony-3.jpg" alt="Ceremony 3"></div>
  </div>
</section>

<section class="showcase-section" id="bouquet">
  <h2>Bespoke <em>Bouquet</em></h2>
  <div class="grid-hero" style="grid-template-columns:1fr 1fr 1fr;grid-template-rows:300px 300px;">
    <div class="img-card"><img src="images/bouquet/bouquet-1.jpg" alt="Bouquet 1"></div>
    <div class="img-card"><img src="images/bouquet/bouquet-2.jpg" alt="Bouquet 2"></div>
    <div class="img-card"><img src="images/bouquet/bouquet-3.jpg" alt="Bouquet 3"></div>
    <div class="img-card" style="grid-column:2/4;"><img src="images/bouquet/bouquet-4.jpg" alt="Bouquet 4"></div>
  </div>
</section>

<section class="showcase-section" id="debut">
  <h2>Debut <em>Celebrations</em></h2>
  <div class="grid-hero" style="grid-template-columns:1fr 1fr;grid-template-rows:320px 320px;">
    <div class="img-card"></div>
    <div class="img-card"></div>
  </div>
</section>

<section class="showcase-section" id="birthday">
  <h2>Birthday <em>Events</em></h2>
  <div class="grid-hero" style="grid-template-columns:1fr 1fr 1.2fr;grid-template-rows:280px 280px;">
    <div class="img-card" style="grid-row:1/3;"></div>
    <div class="img-card"></div>
    <div class="img-card" style="grid-column:3;grid-row:1/3;"></div>
    <div class="img-card" style="grid-column:2;grid-row:2;"></div>
  </div>
</section>

</body>
</html>

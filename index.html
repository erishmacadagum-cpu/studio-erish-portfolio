    <style>
        @keyframes luxuryBreathe {
            0% { transform: scale(1.02); filter: brightness(0.95) contrast(1.05); }
            50% { transform: scale(1.00); filter: brightness(1.02) contrast(0.98); }
            100% { transform: scale(1.02); filter: brightness(0.95) contrast(1.05); }
        }
        .cinematic-breathe {
            animation: luxuryBreathe 12s ease-in-out infinite !important;
        }
    </style>
</head>
<body class="editorial-bg">

    <header class="site-header">
        <div class="header-logo">
            <a href="index.html" class="logo-brand">ERISH</a>

        <button class="menu-toggle" aria-label="Toggle Navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="main-nav">

            <img src="images/hero-journal.jpg" class="cinematic-breathe" style="width: 100%; height: 100%; display: block; object-fit: cover; border: none;" alt="Studio Erish Luxury Presentation Cover" />
            
            <div style="position: absolute; bottom: 4rem; left: 3rem; right: 3rem; color: #ffffff; z-index: 10;">

                <h1 class="serif-title" style="font-size: 3.5rem; font-weight: 300; line-height: 1.1; margin: 0; color: #ffffff; text-shadow: 0px 4px 12px rgba(0,0,0,0.4);">Engineering Elusive Spaces.</h1>

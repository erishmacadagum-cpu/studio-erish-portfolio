<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journal | Studio Erish — Premium Luxury Production</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* FULL BLAST LUXURY BREATHING ANIMATION FRAMEWORK */
        @keyframes highBlastLuxuryBreathe {
            0% { transform: scale(1.00); filter: brightness(0.96) contrast(1.02); }
            50% { transform: scale(1.06); filter: brightness(1.04) contrast(0.98); }
            100% { transform: scale(1.00); filter: brightness(0.96) contrast(1.02); }
        }
        .cinematic-breathe {
            animation: highBlastLuxuryBreathe 12s ease-in-out infinite !important;
            transform-origin: center center;
            transition: transform 0.5s ease-in-out;
        }
        html, body {
            overflow-x: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
        }
        /* Minimalist Footer Grid Styles */
        .luxury-footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2.5rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            border-top: 1px solid #eaeaea;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: #666;
        }
        .footer-column h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: #111;
            letter-spacing: 2px;
            margin: 0 0 1.2rem 0;
            text-transform: uppercase;
        }
        #site-qr-code canvas, #site-qr-code img {
            margin: 0 auto !important;
            border: 6px solid #fff !important;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06) !important;
            display: block !important;
        }
    </style>
</head>
<body class="editorial-bg">

    <header class="site-header">
        <div class="header-logo">
            <a href="index.html" class="logo-brand">ERISH</a>
            <span class="logo-sub">EST. 2007</span>
        </div>
        <button class="menu-toggle" aria-label="Toggle Navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="main-nav">
            <a href="index.html" class="nav-link active">The Journal</a>
            <a href="about.html" class="nav-link">The Legacy</a>
            <a href="services.html" class="nav-link">Curated Services</a>
            <a href="showcases.html" class="nav-link">Showcases</a>
            <a href="inquire.html" class="nav-link">Inquire</a>
        </nav>
    </header>

    <main style="padding: 0 !important; margin: 0 !important; width: 100vw !important; display: block; overflow: hidden;">
        <div style="width: 100vw !important; height: 85vh; overflow: hidden; position: relative; background-color: #000; margin: 0 !important; padding: 0 !important;">
            <img src="images/profile.jpg" class="cinematic-breathe" style="width: 100% !important; height: 100% !important; display: block !important; object-fit: cover !important;" alt="Studio Erish Luxury Curation Cover" />
        </div>
    </main>

    <footer style="background-color: #fafafa; margin-top: 0; padding: 2rem 0 3rem 0; width: 100vw !important;">
        <div class="luxury-footer-grid">
            
            <div class="footer-column" style="display: flex; flex-direction: column; justify-content: space-between;">
                <div>
                    <h4>Studio Erish</h4>
                    <p style="line-height: 1.8; margin: 0; font-weight: 300; font-size: 0.85rem;">Borders on Bespoke Styling &amp; High-End Production Management frameworks.</p>
                </div>
                <p style="margin-top: 2.5rem; font-size: 0.75rem; color: #aaa;">&copy; 2026 All Rights Reserved.</p>
            </div>

            <div class="footer-column" style="text-align: center;">
                <h4>Studio Metrics</h4>
                <div style="margin-bottom: 2rem;">
                    <span style="display: block; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #999; margin-bottom: 0.4rem; font-weight: 500;">Local Time</span>
                    <div id="studio-timeclock" style="font-family: 'Montserrat', sans-serif; font-size: 1.4rem; font-weight: 300; color: #111; letter-spacing: 1px;">00:00:00 AM</div>
                </div>
                <div>
                    <span style="display: block; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #999; margin-bottom: 0.6rem; font-weight: 500;">Total Ledger Visits</span>
                    <img src="https://api.visitorbadge.io/api/visitors?id=studio-erish-production-portfolio-vault&label=VISITS&color=111111&style=flat-square" alt="Visitor Counter Ledger" style="display: inline-block; max-height: 20px; border-radius: 2px;" />
                </div>
            </div>

            <div class="footer-column" style="text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;">
                <h4>Digital Access</h4>
                <div id="site-qr-code" style="display: block; min-height: 112px; min-width: 112px; margin: 0 auto;"></div>
                <span style="display: block; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; color: #999; margin-top: 1rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 500;">SCAN TO SHARE PORTFOLIO</span>
            </div>

        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>

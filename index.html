<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journal | Studio Erish — Premium Luxury Production</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        @keyframes luxuryBreathe {
            0% { transform: scale(1.00); filter: brightness(0.93) contrast(1.04); opacity: 0.95; }
            50% { transform: scale(1.03); filter: brightness(1.03) contrast(0.96); opacity: 1; }
            100% { transform: scale(1.00); filter: brightness(0.93) contrast(1.04); opacity: 0.95; }
        }
        .cinematic-breathe {
            animation: luxuryBreathe 14s ease-in-out infinite !important;
            transform-origin: center center;
            transition: opacity 1.5s ease-in-out;
        }
        html, body {
            overflow-x: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
        }
    </style>
</head>
<body class="editorial-bg">

    <header class="site-header">
        <div class="header-logo">
            <a href="index.html" class="logo-brand">ERISH</a>
            <span class="logo-sub">EST. 2007</span>
        </div>
        <button class="menu-toggle" aria-label="Toggle Navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="main-nav">
            <a href="index.html" class="nav-link active">The Journal</a>
            <a href="about.html" class="nav-link">The Legacy</a>
            <a href="services.html" class="nav-link">Curated Services</a>
            <a href="showcases.html" class="nav-link">Showcases</a>
            <a href="inquire.html" class="nav-link">Inquire</a>
        </nav>
    </header>

    <main style="padding: 0 !important; margin: 0 !important; width: 100vw !important; min-height: 90vh; display: block; overflow: hidden;">
        <div style="width: 100vw !important; margin-left: calc(-50vw + 50%) !important; margin-right: calc(-50vw + 50%) !important; height: 88vh; overflow: hidden; position: relative; background-color: #000;">
            <img src="images/profile.jpg" class="cinematic-breathe" style="width: 100vw !important; width: 100% !important; height: 100% !important; display: block !important; object-fit: cover !important; border: none !important;" alt="Studio Erish Master Artwork" />
            
            <div style="position: absolute; bottom: 5rem; left: 4rem; right: 4rem; color: #ffffff; z-index: 10;">
                <span style="letter-spacing: 5px; font-size: 0.85rem; text-transform: uppercase; color: #e0e0e0; display: block; margin-bottom: 1.2rem;">EDITORIAL COVER</span>
                <h1 class="serif-title" style="font-size: 3.8rem; font-weight: 300; line-height: 1.1; margin: 0; color: #ffffff; text-shadow: 0px 4px 15px rgba(0,0,0,0.5);">Engineering Elusive Spaces.</h1>
            </div>
        </div>
    </main>

    <footer class="site-footer" style="margin-top: 0; padding: 3rem 2rem;">
        <p>&copy; 2026 Studio Erish. All Rights Reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>

    <title>The Journal | Studio Erish — Premium Luxury Production</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* FULL BLAST LUXURY BREATHING ANIMATION FRAMEWORK */
        @keyframes highBlastLuxuryBreathe {
            0% { transform: scale(1.00); filter: brightness(0.96) contrast(1.02); }
            50% { transform: scale(1.06); filter: brightness(1.04) contrast(0.98); }
            100% { transform: scale(1.00); filter: brightness(0.96) contrast(1.02); }
        }
        .cinematic-breathe {
            animation: highBlastLuxuryBreathe 12s ease-in-out infinite !important;
            transform-origin: center center;
            transition: transform 0.5s ease-in-out;
        }
        html, body {
            overflow-x: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
        }
        /* Minimalist Footer Grid Styles */
        .luxury-footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2.5rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            border-top: 1px solid #eaeaea;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: #666;
        }
        .footer-column h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: #111;
            letter-spacing: 2px;
            margin: 0 0 1.2rem 0;
            text-transform: uppercase;
        }
        #site-qr-code canvas, #site-qr-code img {
            margin: 0 auto !important;
            border: 6px solid #fff !important;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06) !important;
            display: block !important;
        }
    </style>
</head>
<body class="editorial-bg">

    <img src="images/erish-logo-new.jpg" alt="Erish Studio Logo" style="max-width: 250px; height: auto; margin: 0 auto;">
</div>

    <main style="padding: 0 !important; margin: 0 !important; width: 100vw !important; display: block; overflow: hidden;">
        <div style="width: 100vw !important; height: 85vh; overflow: hidden; position: relative; background-color: #000; margin: 0 !important; padding: 0 !important;">
            <img src="images/profile.jpg" class="cinematic-breathe" style="width: 100% !important; height: 100% !important; display: block !important; object-fit: cover !important;" alt="Studio Erish Luxury Curation Cover" />
        </div>
